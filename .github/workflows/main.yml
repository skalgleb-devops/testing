container-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build the Testing Image
        run: docker build -t internal-test-image .

      - name: Run the API in the Cloud
        # This starts the container in the background on the GitHub Runner
        run: |
          docker run -d -p 5000:5000 --name test-api internal-test-image
          sleep 5  # Give Flask a moment to wake up

      - name: The "Poke" Test (Curl)
        # This is the actual test! If this fails, the whole Action fails.
        run: curl --fail http://localhost:5000

      - name: Run Pytest inside
        # This runs your unit tests inside that same running container
        run: docker exec test-api pytest
