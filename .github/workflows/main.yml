name: Docker API Testing Pipeline

on:
  push:
    branches: [ "dev-stable-build", "main" ]

jobs:
  container-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build the Testing Image
        run: docker build -t internal-test-image .

      - name: Run the API in the Cloud
        run: |
          docker run -d -p 5000:5000 --name test-api internal-test-image
          sleep 5

      - name: The "Poke" Test (Curl)
        run: curl --fail http://localhost:5000

      - name: Run Pytest inside
        run: docker exec test-api pytest

  docker-hub-push:
    needs: container-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to Hub
        run: |
          docker build -t skalgleb2devops/testing:latest .
          docker push skalgleb2devops/testing:latest
